name: beta-windows-build

on:
  push:
    branches:
      - beta
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:   # Manual trigger
  schedule:           # Daily scheduled build at 00:00 UTC
    - cron: "0 0 * * *"

jobs:
  check-changes:
    name: Check if beta branch has changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0

      - name: Check for new commits since last beta build
        id: check
        shell: bash
        run: |
          # Get the latest beta tag (matches major.minor.buildnumber-beta)
          LAST_TAG=$(git tag --list "*-beta" --sort=-creatordate | head -n 1)
          echo "Last built tag: $LAST_TAG"

          if [ -z "$LAST_TAG" ]; then
            echo "No previous beta builds, running build."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get commit of last tag
          LAST_COMMIT=$(git rev-list -n 1 $LAST_TAG)
          echo "Last commit: $LAST_COMMIT"

          # Check if there are commits on beta since last build
          CHANGES=$(git log $LAST_COMMIT..HEAD --oneline)
          if [ -z "$CHANGES" ]; then
            echo "No new changes since last build, skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New changes detected, running build."
            echo "should_run=true" >> $GITHUB_OUTPUT

  windows:
    name: Windows ${{ matrix.arch }} Release (Beta)
    runs-on: windows-2022
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    strategy:
      matrix:
        include:
          - arch: x86
            platform: Win32
          - arch: x86_64
            platform: x64

    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Read version from jofversion.h.in
        id: baseversion
        shell: bash
        run: |
          MAJOR=$(grep JOF_VERSION_MAJOR versionfile/jofversion.h.in | sed -E 's/.*"(.+)".*/\1/')
          MINOR=$(grep JOF_VERSION_MINOR versionfile/jofversion.h.in | sed -E 's/.*"(.+)".*/\1/')

          if [[ -z "$MAJOR" || -z "$MINOR" ]]; then
            echo "Failed to parse version"
            exit 1
          fi

          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Compute beta version
        id: version
        shell: bash
        run: |
          VERSION="${{ steps.baseversion.outputs.major }}.${{ steps.baseversion.outputs.minor }}.${{ github.run_number }}-beta"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download Sunny's Vulkan DLL
        shell: bash
        run: |
          mkdir -p external

          if [ "${{ matrix.arch }}" = "x86" ]; then
            ZIP_NAME=EternalJK-windows-x86.zip
            DLL_NAME=rd-vulkan_x86.dll
          else
            ZIP_NAME=EternalJK-windows-x86_64.zip
            DLL_NAME=rd-vulkan_x86_64.dll
          fi

          curl -L -o external/$ZIP_NAME \
            https://github.com/JKSunny/EternalJK/releases/download/latest/$ZIP_NAME

          unzip -j external/$ZIP_NAME "$DLL_NAME" -d external

          echo "RD_VULKAN_DLL=${{ github.workspace }}/external/$DLL_NAME" >> $GITHUB_ENV

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake .. -A ${{ matrix.platform }} \
            -DCMAKE_INSTALL_PREFIX=bin \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_NUMBER=${{ github.run_number }} \
            -DGIT_SHA=${{ github.sha }} \
            -DGIT_BRANCH=${{ github.ref_name }} \
            -DEXTERNAL_RD_VULKAN_DLL="$RD_VULKAN_DLL"

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . --config Release -j $NUMBER_OF_PROCESSORS

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install . --config Release

      - name: Upload Beta Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-beta-windows-${{ matrix.arch }}
          path: build/bin
          if-no-files-found: error

  publish-beta:
    name: Publish Beta Release
    needs: windows
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/beta' && needs.check-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Create ZIP archives
        run: |
          zip -r JoF-windows-x86.zip     JoF-beta-windows-x86
          zip -r JoF-windows-x86_64.zip  JoF-beta-windows-x86_64

      - name: Create version tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Update latest-beta tag
        run: |
          git tag -f latest-beta
          git push origin latest-beta --force

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Beta ${{ steps.tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            JoF-windows-x86.zip
            JoF-windows-x86_64.zip
